agents:
  planner:
    command:
      - claude
      - "-p"
      - "{prompt}"
      - "--output-format"
      - json
      - "--plugin-dir"
      - "{plugin_dir}"
      - "--permission-mode"
      - bypassPermissions
      - "--agent"
      - "xpatcher:planner"
      - "--model"
      - "opus[1m]"
    resume_args: ["--resume", "{session_id}"]
    timeout: 600

  plan_reviewer:
