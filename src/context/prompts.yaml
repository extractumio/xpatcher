templates:
  intent_capture: |
    Delegate this task to @agent-planner — do NOT do this work yourself, you MUST use the Agent tool to spawn the planner subagent.

    Task for the planner: Analyze this feature request and produce a structured specification intent document.

    Feature request: $description

    Project directory: $project_dir

    Output a YAML intent document conforming to the IntentOutput schema with: goal, scope, constraints, and any clarifying questions.

    Schema rules:
    - Use `type: intent`
    - `scope` must be a YAML list of strings, not an object with `in_scope` or `out_of_scope`
    - Put out-of-scope items into `constraints` if needed
    - Do not include alternate root keys like `kind`

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the YAML output to: $output_path
    The file must start with --- and contain only valid YAML. Do not include prose or code block markers.
  planner: |
    Delegate this task to @agent-planner — do NOT do this work yourself, you MUST use the Agent tool to spawn the planner subagent.

    Task for the planner: Create a thorough executable specification based on the intent at: $intent_path

    Project directory: $project_dir

    Read the intent, explore the codebase, and produce a structured YAML plan conforming to the PlanOutput schema.

    Required PlanOutput schema structure:
    - type: plan
    - summary: string (min 20 chars)
    - phases: list of {id: "phase-N", name: string, description: string, tasks: [...]}
    - Each task: {id: "task-NNN", description: string (min 10 chars), files: [paths], acceptance: string|list, depends_on: [task-ids], estimated_complexity: low|medium|high}
    - risks: list of {description: string, mitigation: string, severity: low|medium|high} — NOT plain strings

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the YAML output to: $output_path
    The file must start with --- and contain only valid YAML. Do not include prose or code block markers.
  plan_reviewer: |
    Delegate this task to @agent-plan-reviewer — do NOT do this work yourself, you MUST use the Agent tool to spawn the plan-reviewer subagent.

    Task for the plan-reviewer: Review the executable specification at: $plan_path
    Original intent at: $intent_path

    Verify feasibility by checking that referenced files, modules, packages, entry points, configs, and commands actually make sense in: $project_dir.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the YAML review to: $output_path
    The file must start with --- and contain only valid YAML conforming to PlanReviewOutput schema. Do not include prose or code block markers.
  plan_fix: |
    Delegate this task to @agent-planner — do NOT do this work yourself, you MUST use the Agent tool to spawn the planner subagent.

    Task for the planner: Revise the executable specification at: $plan_path
    Based on review findings at: $review_path

    Address all critical and major findings. Strengthen missing behavioral detail, edge cases, compatibility concerns, and verification steps.

    IMPORTANT — the output must conform to PlanOutput schema exactly:
    - type: plan
    - summary: string (min 20 chars)
    - phases: list of {id: "phase-N", name: string, description: string, tasks: [...]}
    - Each task: {id: "task-NNN", description: string (min 10 chars), files: [paths], acceptance: string|list, depends_on: [task-ids], estimated_complexity: low|medium|high}
    - risks: list of {description: string, mitigation: string, severity: low|medium|high} — NOT plain strings

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the revised plan as YAML to: $output_path
    The file must start with --- and contain only valid YAML. Do not include prose or code block markers.
  task_breakdown: |
    Delegate this task to @agent-planner — do NOT do this work yourself, you MUST use the Agent tool to spawn the planner subagent.

    Task for the planner: Decompose the approved specification at: $plan_path into execution slices.

    If the specification describes a single cohesive change, produce a manifest with ONE task. Only decompose when genuinely needed.

    Each task must have: id (task-NNN format), title, description, files_in_scope (plain path strings), acceptance_criteria with executable command checks, depends_on, estimated_complexity (low|medium|high), quality_tier (lite|standard|thorough).

    Hard requirements for acceptance_criteria:
    - Every task must include at least one item with severity: must_pass
    - Every must_pass item must use verification: command
    - Put the actual repo-root shell command in the command field itself
    - Commands must be executable as written, with no placeholders

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the task manifest as YAML to: $output_path
    The file must start with --- and contain only valid YAML conforming to TaskManifestOutput schema. Do not include prose or code block markers.
  task_reviewer: |
    Delegate this task to @agent-plan-reviewer — do NOT do this work yourself, you MUST use the Agent tool to spawn the plan-reviewer subagent.

    Task for the plan-reviewer: Review the execution-slice breakdown at: $manifest_path

    Verify tasks cover the full specification, each has a single clear responsibility, and every task has at least one must_pass command-based criterion.

    Reject the manifest if any task lacks a must_pass command-based acceptance criterion.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the YAML review to: $output_path
    The file must start with --- and contain only valid YAML conforming to TaskManifestReviewOutput schema. Do not include prose or code block markers.
  task_fix: |
    Delegate this task to @agent-planner — do NOT do this work yourself, you MUST use the Agent tool to spawn the planner subagent.

    Task for the planner: Revise the task manifest at: $manifest_path
    Based on review findings at: $review_path

    Address all critical and major findings. Every task must have at least one concrete must_pass command in acceptance_criteria[].command.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the revised task manifest as YAML to: $output_path
    The file must start with --- and contain only valid YAML. Do not include prose or code block markers.
  executor: |
    Delegate this task to @agent-executor — do NOT do this work yourself, you MUST use the Agent tool to spawn the executor subagent.

    Task for the executor: Implement task $task_id.

    Task definition: $task_file
    Plan: $feature_dir/plan-v*.yaml (read the latest version)
    Project: $project_dir

    Git requirements:
    - Stay on the existing xpatcher feature branch
    - Commit with message: xpatcher($task_id): <title>
    - Report the commit hash(es) you created

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the execution result as YAML to: $output_path
    The file must start with --- and contain only valid YAML conforming to ExecutionOutput schema. Do not include prose or code block markers.
  executor_fix: |
    Delegate this task to @agent-executor — do NOT do this work yourself, you MUST use the Agent tool to spawn the executor subagent.

    Task for the executor: Fix the issues found in task $task_id.

    Findings to address:
    $findings_text

    Project: $project_dir

    Fix the issues and report any new commit hashes created.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the execution result as YAML to: $output_path
    The file must start with --- and contain only valid YAML conforming to ExecutionOutput schema. Do not include prose or code block markers.
  tester: |
    Delegate this task to @agent-tester — do NOT do this work yourself, you MUST use the Agent tool to spawn the tester subagent.

    Task for the tester: Generate and run tests for task $task_id.

    Task: $feature_dir/tasks/*/
    Project: $project_dir

    Write tests that validate acceptance criteria using the repository's real test framework.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the test results as YAML to: $output_path
    The file must start with --- and contain only valid YAML. Do not include prose or code block markers.
  reviewer: |
    Delegate this task to @agent-reviewer — do NOT do this work yourself, you MUST use the Agent tool to spawn the reviewer subagent.

    Task for the reviewer: Review the code changes for task $task_id.

    Project: $project_dir
    Task spec and artifacts live under: $feature_dir

    Evaluate independently against the specification artifacts, task acceptance criteria, and actual code behavior.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the review as YAML to: $output_path
    The file must start with --- and contain only valid YAML conforming to ReviewOutput schema. Do not include prose or code block markers.
  gap_detector: |
    Delegate this task to @agent-gap-detector — do NOT do this work yourself, you MUST use the Agent tool to spawn the gap-detector subagent.

    Task for the gap-detector: Analyze the completed implementation for specification-to-code gaps.

    Intent: $feature_dir/intent.yaml
    Plan: $feature_dir/plan-v*.yaml
    Tasks: $feature_dir/tasks/done/
    Project: $project_dir

    Check: specification coverage, API/contract coverage, error handling, edge cases, migration/data compatibility, configuration/runtime wiring, documentation, integration boundaries.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the gap report as YAML to: $output_path
    The file must start with --- and contain only valid YAML conforming to GapOutput schema. Do not include prose or code block markers.
  tech_writer: |
    Delegate this task to @agent-tech-writer — do NOT do this work yourself, you MUST use the Agent tool to spawn the tech-writer subagent.

    Task for the tech-writer: Update documentation for the implemented changes.

    Intent: $feature_dir/intent.yaml
    Tasks: $feature_dir/tasks/done/
    Project: $project_dir

    Update existing docs. Create new docs only for wholly new features.

    Time constraint: current time is $current_time. You have a hard limit of $timeout_minutes minutes. Write the output file BEFORE doing any optional verification. Do not spend time on validation scripts or re-reading the output — write it and stop.
    Write the docs report as YAML to: $output_path
    The file must start with --- and contain only valid YAML conforming to DocsReportOutput schema. Do not include prose or code block markers.
