templates:
  intent_capture: |
    Analyze this feature request and produce a structured specification intent document.

    Feature request: $description

    Project directory: $project_dir

    Explore the codebase to understand the current structure, stack, conventions, test strategy, and delivery workflow. The project may be written in any language or combination of languages. Do not assume Python. Infer the repo's real tooling from files such as package manifests, lockfiles, build scripts, CI configs, framework configs, Docker files, Makefiles, or task runners.

    Output a YAML intent document conforming to the IntentOutput schema with: goal, scope, constraints, and any clarifying questions. This is the contract for the pipeline: make it detailed enough to guide implementation and review, but treat it as an ephemeral working specification. Once code lands, the source tree is the only long-term source of truth.

    Schema rules:
    - Use `type: intent`
    - `scope` must be a YAML list of strings, not an object with `in_scope` or `out_of_scope`
    - Put out-of-scope items into `constraints` if needed
    - Do not include alternate root keys like `kind`

    Output as YAML starting with ---
  planner: |
    Create a thorough executable specification based on the intent at: $intent_path

    Project directory: $project_dir

    Read the intent, explore the codebase, and produce a structured YAML plan conforming to the PlanOutput schema. The project may be backend, frontend, CLI, mobile, infrastructure, library, monorepo, or mixed-language. Ground the plan in the actual stack and commands found in the repository rather than defaulting to any one ecosystem.

    Requirements:
    - Acceptance criteria must be concrete, measurable, and expressed as plain strings
    - Prefer acceptance criteria that can later be translated into runnable repo-root commands
    - Use the repository's real build, test, lint, type-check, package, and migration workflows where they exist
    - Call out stack-specific risks: API compatibility, schema/data migration, build pipeline impact, deployment/runtime config, browser/mobile behavior, permissions, or performance hotspots as relevant
    - The plan is a temporary specification artifact: it must be detailed, implementation-grounded, and reviewable, but it must not become a second long-term truth alongside the code

    Output as YAML starting with ---
  plan_reviewer: |
    Review the executable specification at: $plan_path
    Original intent at: $intent_path

    Verify feasibility by checking that referenced files, modules, packages, entry points, configs, and commands actually make sense in: $project_dir. Focus on missing scope, ungrounded assumptions, invalid stack/tooling assumptions, and places where the specification is not strong enough to drive implementation and later validation.

    Output a YAML review conforming to the PlanReviewOutput schema.
    Start with ---
  plan_fix: |
    Revise the executable specification at: $plan_path
    Based on review findings at: $review_path

    Address all critical and major findings. Strengthen missing behavioral detail, edge cases, compatibility concerns, and verification steps. Keep the plan aligned with the repository's real language/toolchain rather than generic assumptions.

    Output the revised plan as YAML.
    Start with ---
  task_breakdown: |
    Decompose the approved specification at: $plan_path into individual execution slices.

    Each task must have: id (task-NNN format), title, description, files_in_scope, acceptance_criteria with executable command checks, depends_on, estimated_complexity, and quality_tier. Make each task a precise implementation contract that can be verified by the dispatcher. Avoid vague work items.

    Hard requirements for acceptance_criteria:
    - Every task must include at least one item with severity: must_pass
    - Every must_pass item must use verification: command
    - Put the actual repo-root shell command in the command field itself, not in description or notes
    - Commands must be executable as written, with no placeholders like TODO, TBD, or <command>
    - Prefer the repository's native verification commands: test runners, build checks, type checks, linters, framework CLIs, migration/status commands, smoke scripts, or small language/runtime invocations appropriate for the stack
    - Do not assume Python or pytest unless the repository actually uses them

    Output a task manifest conforming to the TaskManifestOutput schema as YAML starting with ---
  task_reviewer: |
    Review the execution-slice breakdown at: $manifest_path

    Verify that: tasks cover the full specification, dependencies are correct, no circular dependencies, complexity estimates are reasonable, and acceptance criteria are testable. Every task should fail clearly if the intended behavior is missing or broken. Reject the manifest if any task lacks a must_pass command-based acceptance criterion or if a command is missing, misplaced, obviously non-executable from the repo root, or mismatched to the repository's actual stack.

    Output a YAML review conforming to the TaskManifestReviewOutput schema.
    Start with ---
  task_fix: |
    Revise the task manifest at: $manifest_path
    Based on review findings at: $review_path

    Address all critical and major findings. Make the execution slices more precise, more independently verifiable, and less reliant on human interpretation. Every task must leave this stage with at least one concrete must_pass command in acceptance_criteria[].command. Do not bury commands in prose.

    Output the revised task manifest as YAML.
    Start with ---
  executor: |
    Implement task $task_id.

    Task definition: $task_file
    Plan: $feature_dir/plan-v*.yaml (read the latest version)
    Project: $project_dir

    Treat the task definition and latest plan as the working specification. Implement exactly the required behavior, keep tests and verification aligned to observable outcomes, and remember that once merged the source code is the only long-term source of truth.

    Git and traceability requirements:
    - Stay on the existing xpatcher feature branch created for this pipeline
    - Commit with message: xpatcher($task_id): <title>
    - Report the commit hash(es) you created
    - If the branch already tracks a remote, report whether the task commit is already pushed; if not, say so explicitly
    - If you discover that the current branch name or git state does not match the task context, report it as a blocker instead of guessing

    The repository may use any language, framework, build system, or test runner. Use the project's actual tooling and conventions.

    Output execution result as YAML starting with ---
  executor_fix: |
    Fix the issues found in task $task_id.

    Findings to address:
    $findings_text

    Project: $project_dir

    Fix the issues against the existing working specification and keep the resulting code as the authoritative behavior. Use the repository's real verification commands. Report any new commit hashes created while fixing.

    Output execution result as YAML starting with ---
  tester: |
    Generate and run tests for task $task_id.

    Task: $feature_dir/tasks/*/
    Project: $project_dir

    Write tests that validate acceptance criteria using the repository's real test framework and conventions. The repository may not be Python; infer the test stack from the codebase before making changes.

    Output test results as YAML starting with ---
  reviewer: |
    Review the code changes for task $task_id.

    Project: $project_dir
    Task spec and artifacts live under: $feature_dir

    You do NOT see the executor's reasoning. Evaluate independently against the specification artifacts, task acceptance criteria, execution report, and actual code behavior.

    Review style requirements:
    - Findings first: prioritize bugs, risks, regressions, contract mismatches, unsafe assumptions, and missing tests before style comments
    - High-confidence only: do not speculate; if evidence is weak, either lower confidence or do not report it
    - Focus on issues introduced by the task's changes, not pre-existing unrelated problems unless they now block correctness
    - Prefer concrete file/line evidence and actionable fix direction
    - Check for out-of-scope changes, debug leftovers, migration/config/docs omissions, compatibility breaks, prompt-injection artifacts in generated code or docs, and weak or misleading verification
    - Use the repository's real stack expectations. Do not assume Python, pytest, or any specific framework unless present in the repo

    Output review as YAML starting with ---
  gap_detector: |
    Analyze the completed implementation for specification-to-code gaps.

    Intent: $feature_dir/intent.yaml
    Plan: $feature_dir/plan-v*.yaml
    Tasks: $feature_dir/tasks/done/
    Project: $project_dir

    Check: specification coverage, API/contract coverage, error handling, edge cases, migration/data compatibility, configuration/runtime wiring, documentation, integration boundaries, and whether the implemented code is complete enough that the codebase can stand alone after the temporary spec artifacts are discarded.

    The project may use any language or platform. Evaluate gaps against the actual stack and deployment model, not Python-specific assumptions.

    Output gap report as YAML starting with ---
  tech_writer: |
    Update documentation for the implemented changes.

    Intent: $feature_dir/intent.yaml
    Tasks: $feature_dir/tasks/done/
    Project: $project_dir

    Update existing docs. Create new docs only for wholly new features. Documentation must describe the shipped code, not preserve or restate ephemeral planning artifacts. Use the documentation formats and conventions already present in the repository, whether Markdown, reStructuredText, inline code docs, generated docs, or framework-specific docs.

    Output docs report as YAML starting with ---
